name: Verify

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ASPNETCORE_ENVIRONMENT: Development
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ModularTemplate.slnx

      - name: Build
        run: dotnet build ModularTemplate.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test ModularTemplate.slnx
          --configuration Release
          --no-build
          --filter "Category=Unit|Category=Application"
          --collect:"XPlat Code Coverage"
          --results-directory artifacts/TestResults

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: artifacts/TestResults/**/*.xml
          if-no-files-found: error

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Typecheck
        run: pnpm frontend:typecheck

      - name: Test
        run: pnpm frontend:test

      - name: Build
        run: pnpm frontend:build

      - name: Lint
        run: pnpm frontend:lint

      - name: Lint scripts
        run: pnpm scripts:lint

      - name: Check API client drift
        run: pnpm api-client:check

  openspec:
    name: OpenSpec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0

      - name: Install OpenSpec
        run: npm install --global @fission-ai/openspec@1.3.1

      - name: Validate OpenSpec
        run: openspec validate --all --strict
