schema: spec-driven

context: |
  This repository is a domain-neutral .NET + React modular-monolith
  foundation.

  Treat docs/governance.md as the project constitution. If an artifact
  conflicts with a MUST rule there, change the artifact unless governance is
  explicitly amended first.

  Before substantial product, domain, runtime, API, persistence, or
  architecture work, read docs/governance.md, docs/README.md,
  docs/openspec.md, relevant stable docs, current specs under openspec/specs/,
  and active changes under openspec/changes/. Prefer referencing those docs
  over repeating their guidance in generated artifacts.

  Stable architecture and platform rules live under docs/. Accepted behavior
  lives under openspec/specs/. Active proposed behavior lives under
  openspec/changes/.

  OpenSpec is for durable behavior and architecture semantics, not technical
  changelog entries. Keep accepted specs observable and testable. Put pure
  refactors, file moves, class renames, one-time migration mechanics,
  generated-client refreshes, and implementation-only cleanup in design.md,
  tasks.md, stable docs, or todo handoffs unless the technical detail is
  itself the durable contract.

  Hard scope gates from governance stay in force: do not add domain behavior,
  auth/session plumbing, generated migrations, frontend apps, orchestration
  resources, CI workflows, generated clients, template automation, durable
  intermodule messaging, or outbox processing unless accepted OpenSpec
  artifacts or durable architecture decisions state the scope.

  Product authorization must remain application-owned and provider-neutral.
  Module contracts must not expose EF entities, aggregate internals, provider
  SDK types, infrastructure details, ClaimsPrincipal, or Host-specific HTTP
  concepts.

rules:
  proposal:
    - State the gap, why it matters now, and the smallest coherent scope.
    - List non-goals for behavior, infrastructure, AI, auth, persistence, external integrations, and frontend workflow when touched.
    - Call out any hard-scope-gated areas from context and the artifact or decision that authorizes them.
    - Separate durable semantics from cleanup mechanics; route mechanics to design/tasks.
    - Keep authorization provider-neutral.
    - Prefer small vertical slices that can be verified and archived before the next related change.

  design:
    - Reference the stable docs that govern the design instead of duplicating long architecture guidance.
    - Define ownership, module boundaries, dependency direction, and state boundaries when relevant.
    - Keep product-owned state separate from framework-owned or execution-local state.
    - Cover persistence, migration, rollback, observability, and verification implications when relevant.
    - Identify deterministic versus LLM-assisted decisions for AI behavior.
    - Include alternatives for important architecture choices.

  specs:
    - Use SHALL or MUST for normative behavior and keep every requirement testable.
    - Each requirement must include at least one Scenario with exactly four leading hash characters.
    - Specify observable guarantees, ownership, lifecycle, compatibility, validation, state transitions, authorization boundaries, or external mutation gates.
    - Do not specify naming cleanup, folder moves, generated artifacts, code organization, adapter internals, EF table shapes, or one-time migration mechanics unless they are the observable contract.
    - Include negative scenarios for authorization, validation, irreversible actions, or external mutations when relevant.
    - Do not specify autonomous external mutations unless human approval, deterministic validation, and integration ownership are explicit in scope.

  tasks:
    - Use checkbox tasks in dependency order, with each task small enough to complete and verify in one focused session.
    - Include tasks for docs updates when implementation resolves open questions or creates durable decisions.
    - Include generated migration and generated client tasks only when the accepted scope requires them.
    - Include backend, frontend, OpenSpec, formatting, and drift checks proportionate to the touched surface.
    - Do not mark broad behavior complete without corresponding tests or an explicit verification note.
    - Track mechanical cleanup here rather than forcing it into specs.
